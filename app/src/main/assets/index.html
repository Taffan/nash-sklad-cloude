<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#efefef" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#1e1e1e" media="(prefers-color-scheme: dark)">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta http-equiv="Permissions-Policy" content="camera=*">
  <link rel="manifest" href="manifest.json">
  <title>Наш Склад</title>

  <!-- Все библиотеки локальные – лежат в той же папке, что и index.html -->
  <script src="xlsx.full.min.js"></script>
  <script src="zxing-library-0.19.1.umd.min.js"></script>
  <script src="tesseract.min.js"></script>

  <style>
    /* твой CSS без изменений, оставляю как есть */
    @font-face {
      font-family: 'Roboto';
      src: local('Roboto'), local('Arial'), sans-serif;
      font-weight: 400 700;
    }
    @font-face {
      font-family: 'Roboto Mono';
      src: local('Roboto Mono'), local('Courier New'), monospace;
      font-weight: 400 500;
    }

    /* ... весь остальной CSS ... */
  </style>
</head>
<body>

  <!-- твой HTML-контент без изменений -->

  <script>
    // Глобальные переменные
    let soundEnabled = localStorage.getItem('sound') !== 'false';
    let isDark = localStorage.getItem('theme') === 'dark';
    let vibrationEnabled = localStorage.getItem('vibration') !== 'false';
    let camActive = false;
    let _tt; // для toast

    // ── Tesseract оффлайн конфиг ──────────────────────────────
    const TESSERACT_CONFIG = {
      workerPath: './worker.min.js',
      corePath: './tesseract-core.wasm.js',
      langPath: './',                        // traineddata должны быть здесь же
      logger: m => console.log('[Tesseract]', m)
    };

    // ── OCR с защитой ─────────────────────────────────────────
    async function recognizeRequest(canvas) {
      if (!canvas) {
        toast('Нет изображения для OCR', 'err');
        return;
      }

      try {
        const worker = await Tesseract.createWorker('rus+eng', 1, TESSERACT_CONFIG);

        const { data } = await worker.recognize(canvas, {
          rectangle: { top: 0, left: 0, width: canvas.width, height: canvas.height } // на всякий случай явно
        });

        let text = data.text.toUpperCase()
          .replace(/O/g, '0')
          .replace(/I/g, '1')
          .replace(/[^A-Z0-9]/g, '');

        const match = text.match(/(INC|REQ)[0-9]{12}/);

        if (match) {
          document.getElementById("f-req").value = match[0];
          toast('✓ ' + match[0], 'ok');
        } else {
          toast('Номер заявки не найден', 'err');
        }

        await worker.terminate();
      } catch (err) {
        console.error('OCR критическая ошибка:', err);
        toast('OCR не запустился: ' + (err.message || 'проверьте файлы traineddata'), 'err');
      }
    }

    function captureFrame() {
      const video = document.querySelector("video");
      if (!video || video.readyState < 2 || !video.videoWidth) {
        toast('Камера не готова или нет видео', 'err');
        return null;
      }

      const canvas = document.createElement("canvas");
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(video, 0, 0);
      return canvas;
    }

    async function scanRequest() {
      const canvas = captureFrame();
      if (!canvas) return;
      await recognizeRequest(canvas);
    }

    // ── Безопасный вызов Android ──
    function callAndroid(method, ...args) {
      if (window.Android && typeof window.Android[method] === 'function') {
        try {
          window.Android[method](...args);
        } catch (e) {
          console.error('Android bridge error:', e);
        }
      } else {
        console.warn('Android bridge недоступен (не в WebView?)');
      }
    }

    // ── Init с защитой ────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', function() {
      const loader = document.getElementById('loader');
      if (loader) loader.style.display = 'none';

      if (!localStorage.getItem('theme')) {
        isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      }

      // Вызываем функции только если они существуют
      if (typeof applyTheme === 'function') applyTheme();
      if (typeof applyVibrationSwitch === 'function') applyVibrationSwitch();
      if (typeof applySoundSwitch === 'function') applySoundSwitch();
      if (typeof updateCount === 'function') updateCount();

      const fdate = document.getElementById('f-date');
      if (fdate) fdate.value = new Date().toISOString().slice(0,10);

      // Автозапуск камеры при активной вкладке
      const scanTab = document.getElementById('tab-scan');
      if (scanTab && scanTab.classList.contains('active')) {
        if (typeof initCamera === 'function') {
          initCamera().catch(e => console.warn('Camera init failed', e));
        } else {
          console.warn('initCamera не определена');
        }
      }
    });

    document.addEventListener('visibilitychange', () => {
      if (document.hidden && camActive && typeof stopCam === 'function') {
        stopCam();
      }
    });

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(e => console.warn('SW registration failed', e));
    }

  </script>
</body>
</html>
