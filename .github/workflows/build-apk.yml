name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Generate keystore
        run: |
          PASS="${{ secrets.KEYSTORE_PASSWORD }}"
          if [ -z "$PASS" ]; then PASS="nashsklad123"; fi
          echo "KS_PASS=$PASS" >> $GITHUB_ENV

          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore.jks
          else
            keytool -genkeypair \
              -keystore keystore.jks -alias upload \
              -keyalg RSA -keysize 2048 -validity 9125 \
              -storepass "$PASS" -keypass "$PASS" \
              -dname "CN=NashSklad,O=NashSklad,C=RU" \
              -noprompt
            echo "keystore_is_new=true" >> $GITHUB_ENV
          fi

          echo "=== SHA-256 fingerprint ==="
          keytool -list -v -keystore keystore.jks -alias upload \
            -storepass "$PASS" -noprompt 2>/dev/null | grep "SHA256:" || true

      - name: Create TWA Android project
        run: |
          python3 << 'PYEOF'
          import os, json

          HOST = "serene-pavlova-a08285.netlify.app"
          PKG  = "app.netlify.serene_pavlova_a08285.twa"
          NAME = "Наш Склад"
          COLOR_ACCENT = "0xFFCC1F1F"
          COLOR_BG     = "0xFFEFEFEF"

          dirs = [
            f"twa/app/src/main/java/{PKG.replace('.','/')}/",
            "twa/app/src/main/res/values/",
            "twa/app/src/main/res/xml/",
            "twa/gradle/wrapper/",
          ]
          for d in dirs:
            os.makedirs(d, exist_ok=True)

          # settings.gradle
          open("twa/settings.gradle","w").write("include ':app'\n")

          # root build.gradle
          open("twa/build.gradle","w").write("""
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          """)

          print("project dirs created")

          # app/build.gradle
          ks_pass = os.environ.get('KS_PASS','nashsklad123')
          open("twa/app/build.gradle","w").write(f"""
          plugins {{ id 'com.android.application' }}
          android {{
              compileSdk 34
              defaultConfig {{
                  applicationId "{PKG}"
                  minSdk 19
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }}
              signingConfigs {{
                  release {{
                      storeFile file("../../keystore.jks")
                      storePassword "{ks_pass}"
                      keyAlias "upload"
                      keyPassword "{ks_pass}"
                  }}
              }}
              buildTypes {{
                  release {{
                      signingConfig signingConfigs.release
                      minifyEnabled false
                  }}
              }}
              compileOptions {{
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }}
          }}
          dependencies {{
              implementation 'com.google.androidbrowserhelper:androidbrowserhelper:2.5.0'
          }}
          """)

          # AndroidManifest.xml
          open(f"twa/app/src/main/AndroidManifest.xml","w").write(f"""<?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.CAMERA"/>
              <application
                  android:label="{NAME}"
                  android:icon="@mipmap/ic_launcher"
                  android:theme="@style/AppTheme"
                  android:allowBackup="true">
                  <activity
                      android:name="com.google.androidbrowserhelper.trusted.LauncherActivity"
                      android:exported="true">
                      <meta-data android:name="android.support.customtabs.trusted.DEFAULT_URL"
                          android:value="https://{HOST}/index.html"/>
                      <intent-filter android:autoVerify="true">
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                      <intent-filter android:autoVerify="true">
                          <action android:name="android.intent.action.VIEW"/>
                          <category android:name="android.intent.category.DEFAULT"/>
                          <category android:name="android.intent.category.BROWSABLE"/>
                          <data android:scheme="https" android:host="{HOST}"/>
                      </intent-filter>
                  </activity>
                  <meta-data android:name="asset_statements"
                      android:resource="@xml/assetlinks"/>
              </application>
          </manifest>
          """)

          # res/values/strings.xml
          open("twa/app/src/main/res/values/strings.xml","w").write(f"""<?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">{NAME}</string>
          </resources>
          """)

          # res/values/styles.xml
          open("twa/app/src/main/res/values/styles.xml","w").write(f"""<?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="Theme.AppCompat.NoActionBar">
                  <item name="colorPrimary">{COLOR_ACCENT}</item>
                  <item name="colorPrimaryDark">{COLOR_ACCENT}</item>
                  <item name="colorAccent">{COLOR_ACCENT}</item>
                  <item name="android:windowBackground">{COLOR_BG}</item>
              </style>
          </resources>
          """)

          # res/xml/assetlinks.xml
          open("twa/app/src/main/res/xml/assetlinks.xml","w").write(f"""<?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="asset_statements">[{{
                  \\"relation\\": [\\"delegate_permission/common.handle_all_urls\\"],
                  \\"target\\": {{
                      \\"namespace\\": \\"web\\",
                      \\"site\\": \\"https://{HOST}\\"
                  }}
              }}]</string>
          </resources>
          """)

          # Create placeholder icon dirs (icons copied in next step)
          for density in ["mdpi","hdpi","xhdpi","xxhdpi","xxxhdpi"]:
              d = f"twa/app/src/main/res/mipmap-{density}"
              os.makedirs(d, exist_ok=True)

          print("TWA project created successfully")
          PYEOF

      - name: Copy real icons into project
        run: |
          for density in mdpi hdpi xhdpi xxhdpi; do
            cp icon-192.png twa/app/src/main/res/mipmap-$density/ic_launcher.png
          done
          cp icon-512.png twa/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png 2>/dev/null || true

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'

      - name: Build release APK
        run: |
          cd twa
          gradle assembleRelease --no-daemon --stacktrace
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: Find APK
        run: |
          APK=$(find twa -name "*.apk" | head -1)
          echo "Found: $APK"
          cp "$APK" NashSklad.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NashSklad-APK
          path: NashSklad.apk
          retention-days: 30

      - name: Show keystore base64 (save to Secrets)
        if: env.keystore_is_new == 'true'
        run: |
          echo "=== Сохраните как KEYSTORE_BASE64 в GitHub Secrets ==="
          base64 keystore.jks
