name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Init Bubblewrap project
        run: |
          mkdir -p apk-build
          cd apk-build
          bubblewrap init \
            --manifest "https://serene-pavlova-a08285.netlify.app/manifest.json" \
            --directory .
        env:
          BUBBLEWRAP_SKIP_JAVA_CHECK: 'true'

      - name: Prepare keystore
        run: |
          PASS="${{ secrets.KEYSTORE_PASSWORD }}"
          if [ -z "$PASS" ]; then PASS="nashsklad123"; fi
          echo "KEYSTORE_PASS=$PASS" >> $GITHUB_ENV

          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore.jks
            echo "keystore_is_new=false" >> $GITHUB_ENV
            echo "Using existing keystore"
          else
            keytool -genkeypair \
              -keystore keystore.jks \
              -alias upload \
              -keyalg RSA \
              -keysize 2048 \
              -validity 9125 \
              -storepass "$PASS" \
              -keypass "$PASS" \
              -dname "CN=NashSklad, OU=Warehouse, O=NashSklad, L=Yaroslavl, S=Yaroslavl, C=RU"
            echo "keystore_is_new=true" >> $GITHUB_ENV
            echo "Created new keystore"
          fi

      - name: Print SHA-256 fingerprint
        run: |
          echo "=== SHA-256 fingerprint (нужен для assetlinks.json) ==="
          keytool -list -v \
            -keystore keystore.jks \
            -alias upload \
            -storepass "$KEYSTORE_PASS" \
            2>/dev/null | grep "SHA256:" || true

      - name: Patch twa-manifest.json
        run: |
          cd apk-build
          python3 << 'PYEOF'
          import json
          import os
          PASS = os.environ.get('KEYSTORE_PASS', 'nashsklad123')
          with open('twa-manifest.json') as f:
              m = json.load(f)
          m['packageId']                   = 'app.netlify.serene_pavlova_a08285.twa'
          m['name']                        = 'Наш Склад'
          m['launcherName']                = 'Наш Склад'
          m['themeColor']                  = '#cc1f1f'
          m['backgroundColor']             = '#efefef'
          m['display']                     = 'fullscreen'
          m['orientation']                 = 'portrait'
          m['enableNotifications']         = False
          m['signingKey']['path']          = '../keystore.jks'
          m['signingKey']['alias']         = 'upload'
          m['signingKey']['keypassword']   = PASS
          m['signingKey']['storepassword'] = PASS
          with open('twa-manifest.json', 'w') as f:
              json.dump(m, f, ensure_ascii=False, indent=2)
          print('OK')
          PYEOF

      - name: Build APK
        run: |
          cd apk-build
          bubblewrap build --skipPwaValidation

      - name: Find APK
        run: |
          APK=$(find apk-build -name "*.apk" | head -1)
          echo "APK_PATH=$APK" >> $GITHUB_ENV
          echo "Found: $APK"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: NashSklad-APK
          path: ${{ env.APK_PATH }}
          retention-days: 30

      - name: Print keystore base64 for Secrets
        if: env.keystore_is_new == 'true'
        run: |
          echo "=== Сохраните в GitHub Secrets как KEYSTORE_BASE64 ==="
          base64 keystore.jks
