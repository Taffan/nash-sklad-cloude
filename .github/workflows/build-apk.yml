name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Generate keystore
        run: |
          PASS="${{ secrets.KEYSTORE_PASSWORD }}"
          if [ -z "$PASS" ]; then PASS="nashsklad123"; fi
          echo "KS_PASS=$PASS" >> $GITHUB_ENV

          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore.jks
          else
            keytool -genkeypair \
              -keystore keystore.jks -alias upload \
              -keyalg RSA -keysize 2048 -validity 9125 \
              -storepass "$PASS" -keypass "$PASS" \
              -dname "CN=NashSklad,O=NashSklad,C=RU" \
              -noprompt
            echo "keystore_is_new=true" >> $GITHUB_ENV
          fi

      - name: Inline JS libraries into HTML
        run: |
          python3 - << 'PYEOF'
          import urllib.request

          with open("index.html", encoding="utf-8") as f:
              html = f.read()

          libs = [
              ("https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js",
               '<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>'),
              ("https://unpkg.com/@zxing/library@0.19.1/umd/index.min.js",
               '<script src="https://unpkg.com/@zxing/library@0.19.1/umd/index.min.js"></script>'),
              ("https://unpkg.com/tesseract.js@5.0.4/dist/tesseract.min.js",
               '<script src="https://unpkg.com/tesseract.js@5.0.4/dist/tesseract.min.js"></script>')
          ]

          for url, tag in libs:
              try:
                  with urllib.request.urlopen(url, timeout=30) as r:
                      code = r.read().decode("utf-8", errors="replace")
                  html = html.replace(tag, f"<script>{code}</script>")
              except Exception as e:
                  print(f"Failed to inline {url}: {e}")

          with open("index.html", "w", encoding="utf-8") as f:
              f.write(html)
          PYEOF

      - name: Create WebView Android project with OCR
        run: |
          python3 - << 'PYEOF'
          import os, shutil

          PKG      = "ru.nashsklad.app"
          NAME     = "Наш Склад"
          KS_PASS  = os.environ.get("KS_PASS", "nashsklad123")
          PKG_PATH = PKG.replace('.', '/')

          # папки
          DIRS = [
              f"app/app/src/main/java/{PKG_PATH}/",
              "app/app/src/main/assets/",
              "app/app/src/main/res/values/"
          ] + [f"app/app/src/main/res/mipmap-{x}/" for x in ["mdpi","hdpi","xhdpi","xxhdpi","xxxhdpi"]]
          for d in DIRS: os.makedirs(d, exist_ok=True)

          # index.html
          shutil.copy("index.html", "app/app/src/main/assets/index.html")

          # settings.gradle
          open("app/settings.gradle","w").write("include ':app'\n")

          # build.gradle
          open("app/build.gradle","w").write(
              "buildscript {\n"
              "    repositories { google(); mavenCentral() }\n"
              "    dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }\n"
              "}\n"
              "allprojects {\n"
              "    repositories { google(); mavenCentral() }\n"
              "}\n"
          )

          # gradle.properties
          open("app/gradle.properties","w").write(
              "android.useAndroidX=true\n"
              "android.enableJetifier=true\n"
              "org.gradle.jvmargs=-Xmx2048m\n"
          )

          # app/build.gradle
          open("app/app/build.gradle","w").write(f"""plugins {{ id 'com.android.application' }}
          android {{
              namespace '{PKG}'
              compileSdk 34
              defaultConfig {{
                  applicationId '{PKG}'
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName '1.0'
              }}
              signingConfigs {{
                  release {{
                      storeFile file('../../keystore.jks')
                      storePassword '{KS_PASS}'
                      keyAlias 'upload'
                      keyPassword '{KS_PASS}'
                  }}
              }}
              buildTypes {{
                  release {{
                      signingConfig signingConfigs.release
                      minifyEnabled false
                  }}
              }}
              compileOptions {{
                  sourceCompatibility JavaVersion.VERSION_11
                  targetCompatibility JavaVersion.VERSION_11
              }}
          }}
          dependencies {{
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'androidx.core:core:1.12.0'
              implementation 'com.google.mlkit:text-recognition:16.0.0'
              implementation 'androidx.camera:camera-core:1.3.1'
              implementation 'androidx.camera:camera-camera2:1.3.1'
              implementation 'androidx.camera:camera-lifecycle:1.3.1'
              implementation 'androidx.lifecycle:lifecycle-runtime-ktx:2.6.2'
              implementation 'com.google.guava:guava:31.1-android'
          }}
          """)

          # AndroidManifest.xml
          os.makedirs("app/app/src/main/", exist_ok=True)
          open("app/app/src/main/AndroidManifest.xml","w").write(f"""<?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.CAMERA"/>
              <application
                  android:label="{NAME}"
                  android:icon="@mipmap/ic_launcher"
                  android:theme="@style/AppTheme">
                  <activity android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          """)

          # MainActivity.java с OCR
          os.makedirs(f"app/app/src/main/java/{PKG_PATH}/", exist_ok=True)
          main_activity = f"""package {PKG};

import android.Manifest;
import android.content.pm.PackageManager;
import android.os.Bundle;
import android.webkit.JavascriptInterface;
import android.webkit.WebView;
import android.webkit.WebViewClient;
import android.widget.Toast;

import androidx.annotation.NonNull;
import androidx.appcompat.app.AppCompatActivity;
import androidx.camera.core.CameraSelector;
import androidx.camera.core.ImageAnalysis;
import androidx.camera.core.ImageProxy;
import androidx.camera.lifecycle.ProcessCameraProvider;
import androidx.core.app.ActivityCompat;
import androidx.core.content.ContextCompat;

import com.google.common.util.concurrent.ListenableFuture;
import com.google.mlkit.vision.common.InputImage;
import com.google.mlkit.vision.text.Text;
import com.google.mlkit.vision.text.TextRecognition;
import com.google.mlkit.vision.text.TextRecognizer;
import com.google.mlkit.vision.text.latin.TextRecognizerOptions;

import java.util.concurrent.ExecutorService;
import java.util.concurrent.Executors;
import java.util.regex.Matcher;
import java.util.regex.Pattern;

public class MainActivity extends AppCompatActivity {{

    private WebView webView;
    private TextRecognizer textRecognizer;
    private ExecutorService cameraExecutor;
    private boolean ocrActive = false;
    private boolean ocrRunning = false;
    private static final int REQ_CAMERA = 101;

    public class AndroidBridge {{
        @JavascriptInterface
        public void startTextOCR() {{
            ocrActive = true;
            runOnUiThread(() -> startCameraForOCR());
        }}

        @JavascriptInterface
        public void stopTextOCR() {{
            ocrActive = false;
        }}

        @JavascriptInterface
        public void showToast(String msg) {{
            runOnUiThread(() -> Toast.makeText(MainActivity.this, msg, Toast.LENGTH_SHORT).show());
        }}
    }}

    @Override
    protected void onCreate(Bundle savedInstanceState) {{
        super.onCreate(savedInstanceState);

        webView = new WebView(this);
        setContentView(webView);

        if (ContextCompat.checkSelfPermission(this, Manifest.permission.CAMERA)
                != PackageManager.PERMISSION_GRANTED) {{
            ActivityCompat.requestPermissions(this,
                    new String[]{{Manifest.permission.CAMERA}}, REQ_CAMERA);
        }}

        textRecognizer = TextRecognition.getClient(TextRecognizerOptions.DEFAULT_OPTIONS);
        cameraExecutor = Executors.newSingleThreadExecutor();

        webView.getSettings().setJavaScriptEnabled(true);
        webView.getSettings().setDomStorageEnabled(true);
        webView.addJavascriptInterface(new AndroidBridge(), "Android");
        webView.setWebViewClient(new WebViewClient());
        webView.loadUrl("file:///android_asset/index.html");
    }}

    private void startCameraForOCR() {{
        ListenableFuture<ProcessCameraProvider> cameraProviderFuture =
                ProcessCameraProvider.getInstance(this);

        cameraProviderFuture.addListener(() -> {{
            try {{
                ProcessCameraProvider cameraProvider = cameraProviderFuture.get();
                cameraProvider.unbindAll();

                ImageAnalysis analysis = new ImageAnalysis.Builder()
                        .setBackpressureStrategy(ImageAnalysis.STRATEGY_KEEP_ONLY_LATEST)
                        .build();

                analysis.setAnalyzer(cameraExecutor, imageProxy -> {{
                    if (!ocrActive || ocrRunning) {{
                        imageProxy.close();
                        return;
                    }}
                    ocrRunning = true;
                    processImage(imageProxy);
                }});

                cameraProvider.bindToLifecycle(this, CameraSelector.DEFAULT_BACK_CAMERA, analysis);
            }} catch (Exception e) {{
                sendOcrResult("ERROR:" + e.getMessage());
            }}
        }}, ContextCompat.getMainExecutor(this));
    }}

    private void processImage(ImageProxy imageProxy) {{
        try {{
            InputImage image = InputImage.fromMediaImage(
                    imageProxy.getImage(),
                    imageProxy.getImageInfo().getRotationDegrees()
            );
            textRecognizer.process(image)
                    .addOnSuccessListener(result -> {{
                        handleTextResult(result);
                        ocrRunning = false;
                        imageProxy.close();
                    }})
                    .addOnFailureListener(e -> {{
                        sendOcrResult("ERROR:" + e.getMessage());
                        ocrRunning = false;
                        imageProxy.close();
                    }});
        }} catch (Exception e) {{
            sendOcrResult("ERROR:" + e.getMessage());
            ocrRunning = false;
            imageProxy.close();
        }}
    }}

    private void handleTextResult(Text result) {{
        String raw = result.getText().toUpperCase();
        StringBuilder sb = new StringBuilder();
        for (int i = 0; i < raw.length(); i++) {{
            char ch = raw.charAt(i);
            if ((ch >= 'A' && ch <= 'Z') || (ch >= '0' && ch <= '9')) sb.append(ch);
        }}
        String text = sb.toString();

        Pattern p = Pattern.compile("(INC|REQ)([0-9O]{{12}})");
        Matcher m = p.matcher(text);
        if (m.find()) {{
            String digits = m.group(2).replace("O", "0");
            sendOcrResult("FOUND:" + m.group(1) + digits);
            ocrActive = false;
        }} else {{
            sendOcrResult("SCANNING");
        }}
    }}

    private void sendOcrResult(String result) {{
        String js = "onOcrResult('" + result + "')";
        runOnUiThread(() -> webView.evaluateJavascript(js, null));
    }}

    @Override
    protected void onDestroy() {{
        super.onDestroy();
        if (cameraExecutor != null) cameraExecutor.shutdown();
        if (textRecognizer != null) textRecognizer.close();
    }}
}}
"""
          with open(f"app/app/src/main/java/{PKG_PATH}/MainActivity.java", "w") as f:
              f.write(main_activity)
          PYEOF

      - name: Copy icons
        run: |
          for d in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            cp icon-192.png app/app/src/main/res/mipmap-$d/ic_launcher.png
          done

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'

      - name: Build release APK
        run: |
          echo "sdk.dir=$ANDROID_HOME" > app/local.properties
          cd app
          gradle assembleRelease --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: NashSklad-APK
          path: app/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: Print keystore base64
        if: env.keystore_is_new == 'true'
        run: |
          echo "=== Сохраните как KEYSTORE_BASE64 ==="
          base64 keystore.jks
