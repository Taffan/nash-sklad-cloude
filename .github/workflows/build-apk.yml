name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.6

      - name: Generate keystore if not in secrets
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore.jks
          else
            keytool -genkeypair \
              -keystore keystore.jks \
              -alias upload \
              -keyalg RSA -keysize 2048 -validity 9125 \
              -storepass nashsklad123 -keypass nashsklad123 \
              -dname "CN=NashSklad,O=NashSklad,C=RU" \
              -noprompt
            echo "=== СОХРАНИТЕ КАК KEYSTORE_BASE64 ==="
            base64 keystore.jks
          fi

      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace --no-daemon

      - name: Sign APK
        run: |
          PASS="${{ secrets.KEYSTORE_PASSWORD }}"
          if [ -z "$PASS" ]; then PASS="nashsklad123"; fi

          $ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools | sort -V | tail -1)/apksigner sign \
            --ks keystore.jks \
            --ks-key-alias upload \
            --ks-pass pass:$PASS \
            --key-pass pass:$PASS \
            --out app/build/outputs/apk/release/app-release-signed.apk \
            app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: NashSklad-APK
          path: app/build/outputs/apk/release/app-release-signed.apk
          if-no-files-found: error
