name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Generate keystore
        run: |
          keytool -genkeypair \
          -keystore keystore.jks \
          -alias upload \
          -storepass nashsklad123 \
          -keypass nashsklad123 \
          -dname "CN=NashSklad" \
          -keyalg RSA \
          -validity 20000

      - name: Generate Android project
        run: python3 scripts/create_webview_project.py

      - name: Copy icons
        run: |
          for d in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            cp icon-192.png app/src/main/res/mipmap-$d/ic_launcher.png
          done

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.6

      - name: Build release
        run: |
          echo "sdk.dir=$ANDROID_HOME" > app/local.properties
          cd app
          gradle assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nash-sklad-apk
          path: app/build/outputs/apk/release/app-release.apk
