name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Generate keystore
        run: |
          PASS="${{ secrets.KEYSTORE_PASSWORD }}"
          if [ -z "$PASS" ]; then PASS="nashsklad123"; fi
          echo "KS_PASS=$PASS" >> $GITHUB_ENV

          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore.jks
          else
            keytool -genkeypair \
              -keystore keystore.jks -alias upload \
              -keyalg RSA -keysize 2048 -validity 9125 \
              -storepass "$PASS" -keypass "$PASS" \
              -dname "CN=NashSklad,O=NashSklad,C=RU" \
              -noprompt
            echo "keystore_is_new=true" >> $GITHUB_ENV
          fi

      - name: Create Python script for inlining JS
        run: |
          cat <<EOF > inline_libs.py
import urllib.request

with open('index.html', encoding='utf-8') as f:
    html = f.read()

libs = [
    ('https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js',
     '<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>'),
    ('https://unpkg.com/@zxing/library@0.19.1/umd/index.min.js',
     '<script src="https://unpkg.com/@zxing/library@0.19.1/umd/index.min.js"></script>'),
    ('https://unpkg.com/tesseract.js@5.0.4/dist/tesseract.min.js',
     '<script src="https://unpkg.com/tesseract.js@5.0.4/dist/tesseract.min.js"></script>')
]

for url, tag in libs:
    try:
        with urllib.request.urlopen(url, timeout=30) as r:
            code = r.read().decode('utf-8', errors='replace')
        html = html.replace(tag, f'<script>{code}</script>')
    except Exception as e:
        print(f'Failed to inline {url}: {e}')

with open('index.html', 'w', encoding='utf-8') as f:
    f.write(html)
EOF

      - name: Inline JS libraries into HTML
        run: python3 inline_libs.py

      - name: Create Android Gradle project
        run: |
          mkdir -p app/app/src/main/java/ru/nashsklad/app
          mkdir -p app/app/src/main/assets
          mkdir -p app/app/src/main/res/values
          for d in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            mkdir -p app/app/src/main/res/mipmap-$d
          done

          echo "include ':app'" > app/settings.gradle

          cat <<EOF > app/build.gradle
buildscript {
    repositories { google(); mavenCentral() }
    dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
}
allprojects { repositories { google(); mavenCentral() } }
EOF

          cat <<EOF > app/app/build.gradle
plugins { id 'com.android.application' }

android {
    namespace 'ru.nashsklad.app'
    compileSdk 34
    defaultConfig {
        applicationId 'ru.nashsklad.app'
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName '1.0'
    }
    signingConfigs {
        release {
            storeFile file('../../keystore.jks')
            storePassword System.getenv('KS_PASS')
            keyAlias 'upload'
            keyPassword System.getenv('KS_PASS')
        }
    }
    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled false
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.core:core:1.12.0'
    implementation 'com.google.mlkit:text-recognition:16.0.0'
    implementation 'androidx.camera:camera-core:1.3.1'
    implementation 'androidx.camera:camera-camera2:1.3.1'
    implementation 'androidx.camera:camera-lifecycle:1.3.1'
    implementation 'androidx.lifecycle:lifecycle-runtime-ktx:2.6.2'
    implementation 'com.google.guava:guava:31.1-android'
}
EOF

      - name: Copy index.html
        run: cp index.html app/app/src/main/assets/index.html

      - name: Copy MainActivity.java
        run: cp android_template/MainActivity.java app/app/src/main/java/ru/nashsklad/app/MainActivity.java

      - name: Copy icons
        run: |
          for d in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            cp icon-192.png app/app/src/main/res/mipmap-$d/ic_launcher.png
          done

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'

      - name: Build release APK
        run: |
          echo "sdk.dir=$ANDROID_HOME" > app/local.properties
          cd app
          gradle assembleRelease --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: NashSklad-APK
          path: app/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: Print keystore base64
        if: env.keystore_is_new == 'true'
        run: |
          echo "=== Сохраните как KEYSTORE_BASE64 ==="
          base64 keystore.jks
