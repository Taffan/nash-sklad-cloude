<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#efefef" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#1e1e1e" media="(prefers-color-scheme: dark)">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta http-equiv="Permissions-Policy" content="camera=*">
  <link rel="manifest" href="manifest.json">
  <title>Наш Склад</title>

  <!-- Локальные библиотеки – положи их в assets/ или рядом с index.html -->
  <!-- <script src="xlsx.full.min.js"></script>          → положи файл -->
  <!-- <script src="zxing-library-0.19.1.umd.min.js"></script> → положи файл -->
  <script src="tesseract.min.js"></script>

  <style>
    /* убраны @import Google Fonts – используй локальные шрифты или системные */
    @font-face {
      font-family: 'Roboto';
      src: local('Roboto'), local('Arial'), sans-serif;
      font-weight: 400 700;
    }
    @font-face {
      font-family: 'Roboto Mono';
      src: local('Roboto Mono'), local('Courier New'), monospace;
      font-weight: 400 500;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body { 
      touch-action: manipulation; 
      height: 100%; 
      overflow: hidden; 
    }

    body {
      font-family: 'Roboto', Arial, sans-serif;
      background: var(--bg, #efefef);
      color: var(--text, #1a1a1a);
    }

    :root {
      --bg: #efefef;
      --surface: #ffffff;
      --surface2: #e8e8e8;
      --border: #d0d0d0;
      --accent: #cc1f1f;
      --accent-dim: rgba(204,31,31,0.10);
      --danger: #b91c1c;
      --text: #1a1a1a;
      --text2: #555555;
      --text3: #999999;
      --r: 8px;
    }

    [data-theme="dark"] {
      --bg: #121212;
      --surface: #1e1e1e;
      --surface2: #2a2a2a;
      --border: #383838;
      --accent: #e03333;
      --accent-dim: rgba(224,51,51,0.15);
      --danger: #ef4444;
      --text: #f0f0f0;
      --text2: #aaaaaa;
      --text3: #666666;
    }

    /* ... весь остальной CSS без изменений ... (оставляю как есть, он не зависит от сети) */
  </style>
</head>
<body>

  <!-- твой HTML-контент остаётся без изменений -->

  <script>
    // Глобальные переменные (добавил let/const где нужно)
    let soundEnabled = localStorage.getItem('sound') !== 'false';
    let isDark = localStorage.getItem('theme') === 'dark';
    let vibrationEnabled = localStorage.getItem('vibration') !== 'false';
    let camActive = false;
    let _tt; // для toast

    // ── Tesseract оффлайн конфиг ──────────────────────────────
    const TESSERACT_CONFIG = {
      workerPath: 'worker.min.js',           // положи рядом
      corePath: 'tesseract-core.wasm.js',    // или .wasm – положи рядом
      langPath: './',                        // traineddata в той же папке или подпапке
      logger: m => console.log('[Tesseract]', m)
    };

    // ── OCR ────────────────────────────────────────────────────
    async function recognizeRequest(canvas) {
      try {
        const worker = await Tesseract.createWorker('rus+eng', 1, TESSERACT_CONFIG);

        const { data } = await worker.recognize(canvas);

        let text = data.text.toUpperCase()
          .replace(/O/g, '0')
          .replace(/I/g, '1')
          .replace(/[^A-Z0-9]/g, '');

        const match = text.match(/(INC|REQ)[0-9]{12}/);

        if (match) {
          document.getElementById("f-req").value = match[0];
          toast('✓ ' + match[0], 'ok');
        } else {
          toast('Номер заявки не найден', 'err');
        }

        await worker.terminate();
      } catch (err) {
        console.error('OCR error:', err);
        toast('OCR ошибка: ' + err.message, 'err');
      }
    }

    function captureFrame() {
      const video = document.querySelector("video");
      if (!video || !video.videoWidth) return null;

      const canvas = document.createElement("canvas");
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(video, 0, 0);
      return canvas;
    }

    async function scanRequest() {
      const canvas = captureFrame();
      if (!canvas) {
        toast('Камера не готова', 'err');
        return;
      }
      await recognizeRequest(canvas);
    }

    // ── Остальные функции без изменений (с небольшими фиксами) ──

    function applyOcrManual() {
      const input = document.getElementById('ocr-manual-input');
      if (!input) return;
      const raw = input.value.trim().toUpperCase().replace(/[-_\s]/g,'');
      if (!raw) { toast('⚠ Введите номер заявки', 'err'); return; }
      const m = raw.match(/^(INC|REQ)([0-9O]{12})$/);
      if (m) {
        const result = m[1] + m[2].replace(/O/g,'0');
        document.getElementById('f-req').value = result;
        toast('✓ ' + result, 'ok');
        closeOCR();
      } else if (raw.length >= 5) {  // поднял порог с 3 до 5
        document.getElementById('f-req').value = input.value.trim();
        toast('✓ Принято', 'ok');
        closeOCR();
      } else {
        toast('⚠ Слишком короткий номер', 'err');
      }
    }

    function closeOCR() {
      document.getElementById('ocr-modal').style.display = 'none';
      const inp = document.getElementById('ocr-manual-input');
      if (inp) inp.value = '';
    }

    function toast(msg, type) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.className = `toast show ${type || ''}`;
      clearTimeout(_tt);
      _tt = setTimeout(() => el.classList.remove('show'), 2500);
    }

    function toggleSound() {
      soundEnabled = document.getElementById('sound-toggle').checked;
      localStorage.setItem('sound', soundEnabled ? 'true' : 'false');
      applySoundSwitch();
      if (soundEnabled) beep();
    }

    // ... остальные функции applySoundSwitch, applyTheme, toggleTheme, toggleVibration и т.д. без изменений ...

    // ── WebView bridge safety ──
    function callAndroid(method, ...args) {
      if (window.Android && typeof window.Android[method] === 'function') {
        window.Android[method](...args);
      }
    }

    // Пример использования: callAndroid('stopTextOCR');

    // ── Init ───────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', function() {
      const loader = document.getElementById('loader');
      if (loader) loader.style.display = 'none';

      if (!localStorage.getItem('theme')) {
        isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      }
      applyTheme();
      applyVibrationSwitch();
      applySoundSwitch();
      updateCount(); // предполагаю, что функция существует

      const fdate = document.getElementById('f-date');
      if (fdate) fdate.value = new Date().toISOString().slice(0,10);

      // Автозапуск камеры при открытии сканера
      const scanTab = document.getElementById('tab-scan');
      if (scanTab && scanTab.classList.contains('active')) {
        initCamera().catch(e => console.warn('Camera init failed', e));
      }
    });

    document.addEventListener('visibilitychange', () => {
      if (document.hidden && camActive) stopCam();
    });

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }

  </script>
</body>
</html>
